# ===========================================
# Debezium Server Configuration
# ===========================================
# Captures changes from PostgreSQL WAL and sends to Redpanda (Kafka)

# ---- Source: PostgreSQL ----
debezium.source.connector.class=io.debezium.connector.postgresql.PostgresConnector
debezium.source.database.hostname=postgres
debezium.source.database.port=5432
debezium.source.database.user=admin
debezium.source.database.password=secret
debezium.source.database.dbname=operations
debezium.source.topic.prefix=cdc
debezium.source.plugin.name=pgoutput
debezium.source.publication.name=debezium_pub

# Table to capture (schema.table format)
debezium.source.table.include.list=public.orders

# ---- Sink: Redpanda (Kafka) ----
debezium.sink.type=kafka
debezium.sink.kafka.producer.bootstrap.servers=redpanda:9092
debezium.sink.kafka.producer.key.serializer=org.apache.kafka.common.serialization.StringSerializer
debezium.sink.kafka.producer.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# ---- Transforms: Flatten the CDC envelope ----
# By default, Debezium wraps data in an envelope with before/after/source/op fields
# We use ExtractNewRecordState to flatten it to just the row data
debezium.transforms=unwrap
debezium.transforms.unwrap.type=io.debezium.transforms.ExtractNewRecordState
debezium.transforms.unwrap.drop.tombstones=true
debezium.transforms.unwrap.delete.handling.mode=drop

# ---- Format ----
debezium.format.key=json
debezium.format.value=json

# ---- Offset storage (tracks what's been processed) ----
debezium.source.offset.storage.file.filename=/debezium/data/offsets.dat
debezium.source.offset.flush.interval.ms=10000

# ---- Schema history (tracks DDL changes) ----
debezium.source.schema.history.internal=io.debezium.storage.file.history.FileSchemaHistory
debezium.source.schema.history.internal.file.filename=/debezium/data/schema-history.dat
