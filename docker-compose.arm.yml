# Versión ARM64 - Usa TimescaleDB en lugar de ClickHouse
# Para Raspberry Pi, Apple Silicon, etc.
# Uso: docker compose -f docker-compose.arm.yml up -d

services:
  # Base de datos operacional (OLTP)
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: operations
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d operations"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Message Broker (Kafka-compatible, ligero)
  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"  # External (host access)
      - "9092:9092"    # Internal (docker network)
      - "9644:9644"
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Base de datos analítica (OLAP) - TimescaleDB para ARM
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_DB: analytics
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5433:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./timescaledb/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d analytics"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Capa semántica - Cube.js conectado a TimescaleDB
  cube:
    image: cubejs/cube:latest
    ports:
      - "4000:4000"
    environment:
      CUBEJS_DB_TYPE: postgres
      CUBEJS_DB_HOST: timescaledb
      CUBEJS_DB_PORT: 5432
      CUBEJS_DB_NAME: analytics
      CUBEJS_DB_USER: admin
      CUBEJS_DB_PASS: secret
      CUBEJS_API_SECRET: your-secret-key-change-in-production
      CUBEJS_DEV_MODE: "true"
      CUBEJS_SCHEMA_PATH: /cube/conf/model
    volumes:
      - ./cube:/cube/conf
    depends_on:
      timescaledb:
        condition: service_healthy

volumes:
  postgres_data:
  timescale_data:
