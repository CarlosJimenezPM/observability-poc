# ===========================================
# Observability PoC - Docker Compose (ARM64)
# ===========================================
# For Raspberry Pi, Apple Silicon, etc.
# Uses TimescaleDB instead of ClickHouse (ClickHouse has ARM issues)
# Usage: docker compose -f docker-compose.arm.yml up -d
# ===========================================
# ⚠️  SECURITY WARNING:
# Default values are for LOCAL DEVELOPMENT ONLY.
# For production, create a .env file with secure values.
# See .env.example for required variables.
# ===========================================
#
# Architecture (same as x86, different OLAP DB):
#   Simulator → PostgreSQL → (WAL) → Debezium → Redpanda → TimescaleDB → Cube.js
#
# ===========================================

services:
  # ===========================================
  # Base de datos operacional (OLTP)
  # ===========================================
  postgres:
    image: postgres:15-alpine
    command:
      - postgres
      - -c
      - wal_level=logical           # Enable logical replication for CDC
      - -c
      - max_replication_slots=4     # Allow Debezium to create replication slots
      - -c
      - max_wal_senders=4           # Allow replication connections
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-operations}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    ports:
      - "5432:5432"  # ⚠️ Production: remove or use internal network only
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d  # CDC setup scripts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-operations}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ===========================================
  # Message Broker (Kafka-compatible, ligero)
  # ===========================================
  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"  # External (host access)
      - "9092:9092"    # Internal (docker network)
      - "9644:9644"    # Admin API - ⚠️ Production: remove this port
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # CDC: Change Data Capture (Debezium Server)
  # ===========================================
  debezium:
    image: debezium/server:2.5
    volumes:
      - ./debezium:/debezium/conf
      - debezium_data:/debezium/data
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/q/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ===========================================
  # CDC Consumer (Redpanda → TimescaleDB)
  # ===========================================
  # This is the ARM equivalent of ClickHouse's Kafka Engine
  cdc-consumer:
    build: ./cdc-consumer
    environment:
      - KAFKA_BROKERS=redpanda:9092
      - KAFKA_TOPIC=cdc.public.orders
      - KAFKA_GROUP=timescale-cdc-consumer
      - PG_URL=postgresql://admin:secret@timescaledb:5432/analytics
    depends_on:
      redpanda:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      debezium:
        condition: service_healthy
    restart: unless-stopped

  # ===========================================
  # Base de datos analítica (OLAP) - TimescaleDB para ARM
  # ===========================================
  # Note: Unlike ClickHouse, TimescaleDB doesn't have Kafka Engine.
  # We use a Kafka consumer worker to write data from Redpanda.
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_DB: ${TIMESCALE_DB:-analytics}
      POSTGRES_USER: ${TIMESCALE_USER:-admin}
      POSTGRES_PASSWORD: ${TIMESCALE_PASSWORD:-secret}
    ports:
      - "5433:5432"  # ⚠️ Production: remove or use internal network only
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ./timescaledb/init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${TIMESCALE_USER:-admin} -d ${TIMESCALE_DB:-analytics}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ===========================================
  # Cache para Cube.js
  # ===========================================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ===========================================
  # Capa semántica - Cube.js conectado a TimescaleDB
  # ===========================================
  cube:
    image: cubejs/cube:latest
    ports:
      - "4000:4000"
    environment:
      CUBEJS_DB_TYPE: postgres
      CUBEJS_DB_HOST: timescaledb
      CUBEJS_DB_PORT: 5432
      CUBEJS_DB_NAME: ${TIMESCALE_DB:-analytics}
      CUBEJS_DB_USER: ${TIMESCALE_USER:-admin}
      CUBEJS_DB_PASS: ${TIMESCALE_PASSWORD:-secret}
      CUBEJS_API_SECRET: ${CUBEJS_API_SECRET:-dev-secret-change-in-production}
      CUBEJS_DEV_MODE: ${CUBEJS_DEV_MODE:-true}
      CUBEJS_SCHEMA_PATH: /cube/conf/model
      CUBEJS_CACHE_AND_QUEUE_DRIVER: cubestore
    volumes:
      - ./cube:/cube/conf
    depends_on:
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy

  # ===========================================
  # MCP Server (IA integration)
  # ===========================================
  mcp:
    build: ./mcp-server
    ports:
      - "3001:3001"
    environment:
      - CUBE_API_URL=http://cube:4000
      - CUBE_API_SECRET=${CUBEJS_API_SECRET:-dev-secret-change-in-production}
      - MCP_PORT=3001
      - DATABASE_URL=postgresql://admin:secret@postgres:5432/operations
    depends_on:
      - cube
      - postgres

  # ===========================================
  # Frontend demo
  # ===========================================
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
      - "4001:4001"
    environment:
      - PG_URL=postgres://admin:secret@postgres:5432/operations
      - VITE_CUBEJS_API_SECRET=${CUBEJS_API_SECRET:-dev-secret-change-in-production}
    depends_on:
      - cube
      - postgres

volumes:
  postgres_data:
  timescale_data:
  debezium_data:
