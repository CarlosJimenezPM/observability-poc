# ===========================================
# Observability PoC - Docker Compose (x86_64)
# ===========================================
# ⚠️  SECURITY WARNING:
# Default values are for LOCAL DEVELOPMENT ONLY.
# For production, create a .env file with secure values.
# See .env.example for required variables.
# ===========================================
#
# Architecture:
#   Simulator → PostgreSQL → (WAL) → Debezium → Redpanda → ClickHouse → Cube.js
#
# The simulator ONLY writes to PostgreSQL. Debezium captures changes
# from the WAL and streams them to Redpanda (Kafka). ClickHouse consumes
# from Redpanda automatically via Kafka Engine.
# ===========================================

services:
  # ===========================================
  # Base de datos operacional (OLTP)
  # ===========================================
  postgres:
    image: postgres:15-alpine
    command:
      - postgres
      - -c
      - wal_level=logical           # Enable logical replication for CDC
      - -c
      - max_replication_slots=4     # Allow Debezium to create replication slots
      - -c
      - max_wal_senders=4           # Allow replication connections
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-operations}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    ports:
      - "5432:5432"  # ⚠️ Production: remove or use internal network only
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d  # CDC setup scripts
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-operations}"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ===========================================
  # Message Broker (Kafka-compatible, ligero)
  # ===========================================
  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"  # External (host access)
      - "9092:9092"    # Internal (docker network)
      - "9644:9644"    # Admin API - ⚠️ Production: remove this port
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ===========================================
  # CDC: Change Data Capture (Debezium Server)
  # ===========================================
  # Reads PostgreSQL WAL and streams changes to Redpanda
  # This is the "correct" way to sync OLTP → OLAP (no dual-write)
  debezium:
    image: debezium/server:2.5
    volumes:
      - ./debezium:/debezium/conf        # Configuration
      - debezium_data:/debezium/data     # Offset storage (tracks progress)
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/q/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s  # Give it time to connect to PostgreSQL

  # ===========================================
  # Base de datos analítica (OLAP)
  # ===========================================
  clickhouse:
    image: clickhouse/clickhouse-server:23.8-alpine
    environment:
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-}
    ports:
      - "8123:8123"  # HTTP - ⚠️ Production: remove or use internal network only
      - "9000:9000"  # Native - ⚠️ Production: remove
    volumes:
      - ./clickhouse/init:/docker-entrypoint-initdb.d
      - clickhouse_data:/var/lib/clickhouse
    depends_on:
      redpanda:
        condition: service_healthy

  # ===========================================
  # Cache para Cube.js
  # ===========================================
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ===========================================
  # Capa semántica
  # ===========================================
  cube:
    image: cubejs/cube:latest
    ports:
      - "4000:4000"
    environment:
      CUBEJS_DB_TYPE: clickhouse
      CUBEJS_DB_HOST: clickhouse
      CUBEJS_DB_PORT: 8123
      CUBEJS_DB_NAME: default
      CUBEJS_DB_USER: ${CLICKHOUSE_USER:-default}
      CUBEJS_DB_PASS: ${CLICKHOUSE_PASSWORD:-}
      # Row-Level Security: Set to "true" to use ClickHouse RLS (defense-in-depth)
      CUBEJS_USE_RLS: ${CUBEJS_USE_RLS:-false}
      CLICKHOUSE_CUBE_PASSWORD: ${CLICKHOUSE_CUBE_PASSWORD:-cube_secure_password_change_me}
      # ⚠️ SECURITY: Generate a secure secret for production
      # Use: openssl rand -hex 32
      CUBEJS_API_SECRET: ${CUBEJS_API_SECRET:-dev-secret-change-in-production}
      # ⚠️ SECURITY: Set to "false" in production
      CUBEJS_DEV_MODE: ${CUBEJS_DEV_MODE:-true}
      # Cache (cubestore is built-in, redis no longer supported)
      CUBEJS_CACHE_AND_QUEUE_DRIVER: cubestore
    volumes:
      - ./cube:/cube/conf
    depends_on:
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_started

  # ===========================================
  # MCP Server (IA integration)
  # ===========================================
  mcp:
    build: ./mcp-server
    ports:
      - "3001:3001"
    environment:
      - CUBE_API_URL=http://cube:4000
      - CUBE_API_SECRET=${CUBEJS_API_SECRET:-dev-secret-change-in-production}
      - MCP_PORT=3001
    depends_on:
      - cube

  # ===========================================
  # Frontend demo
  # ===========================================
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
      - "4001:4001"
    environment:
      - PG_URL=postgres://admin:secret@postgres:5432/operations
      - VITE_CUBEJS_API_SECRET=${CUBEJS_API_SECRET:-dev-secret-change-in-production}
    depends_on:
      - cube
      - postgres

volumes:
  postgres_data:
  clickhouse_data:
  debezium_data:
