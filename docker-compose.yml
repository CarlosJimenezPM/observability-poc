services:
  # Base de datos operacional (OLTP)
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: operations
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d operations"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Message Broker (Kafka-compatible, ligero)
  redpanda:
    image: redpandadata/redpanda:latest
    command:
      - redpanda start
      - --smp 1
      - --memory 512M
      - --overprovisioned
      - --kafka-addr internal://0.0.0.0:9092,external://0.0.0.0:19092
      - --advertise-kafka-addr internal://redpanda:9092,external://localhost:19092
    ports:
      - "19092:19092"  # External (host access)
      - "9092:9092"    # Internal (docker network)
      - "9644:9644"    # Admin API
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Base de datos analítica (OLAP)
  clickhouse:
    image: clickhouse/clickhouse-server:23.8-alpine
    ports:
      - "8123:8123"  # HTTP
      - "9000:9000"  # Native
    volumes:
      - ./clickhouse/init:/docker-entrypoint-initdb.d
      - clickhouse_data:/var/lib/clickhouse
    depends_on:
      redpanda:
        condition: service_healthy

  # Capa semántica
  cube:
    image: cubejs/cube:latest
    ports:
      - "4000:4000"
    environment:
      CUBEJS_DB_TYPE: clickhouse
      CUBEJS_DB_HOST: clickhouse
      CUBEJS_DB_PORT: 8123
      CUBEJS_DB_NAME: default
      CUBEJS_API_SECRET: your-secret-key-change-in-production
      CUBEJS_DEV_MODE: "true"
    volumes:
      - ./cube/schema:/cube/conf/schema
    depends_on:
      - clickhouse

volumes:
  postgres_data:
  clickhouse_data:
